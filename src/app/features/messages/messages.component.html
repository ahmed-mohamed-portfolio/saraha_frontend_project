<div class="flex justify-center items-center">

    <div
        class="my-25 w-full max-w-[80%] sm:max-w-[70%] md:max-w-[60%] lg:max-w-[55%] p-6 bg-neutral-primary-soft border border-default rounded-base shadow-xs">
        <h5 class="text-xl font-semibold text-heading mb-6">Private Messages</h5>
        <div class="flow-root">
            <ul role="list" class="divide-y divide-default">


                @for (message of this.messages().data; track $index) {


                <li class="py-4 sm:py-4">
                    <div class="flex justify-evenly items-center gap-2">
                        <div class="shrink-0">
                            <img class="w-8 h-8 rounded-full" src="/user-secret.png" alt="Bonnie image">
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-sm ">
                                {{message.message}}
                            </p>

                        </div>
                        <div class="inline-flex items-center space-x-1.5">

                            <button data-tooltip-target="tooltip-remove-2" type="button"
                                class="cursor-pointer inline-flex items-center justify-center text-fg-danger bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base h-9 w-9 focus:outline-none">
                                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24"
                                    height="24" fill="none" viewBox="0 0 24 24">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M5 7h14m-9 3v8m4-8v8M10 3h4a1 1 0 0 1 1 1v3H9V4a1 1 0 0 1 1-1ZM6 7h12v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7Z" />
                                </svg>
                            </button>
                            <div id="tooltip-remove-2" role="tooltip"
                                class="absolute z-10 invisible inline-block px-3 py-2 text-sm leading-4 font-medium text-white transition-opacity duration-300 bg-dark rounded-base shadow-xs force:opacity-0 tooltip">
                                Remove
                                <div class="tooltip-arrow" data-popper-arrow></div>
                            </div>
                        </div>
                    </div>
                </li>

                }@empty {
                <p>No messages</p>
                }
            </ul>
        </div>
    </div>

</div>
